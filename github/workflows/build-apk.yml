name: Build Android APK

on:
  workflow_dispatch:   # تشغيل يدوي من تبويب Actions
  push:                # تشغيل عند أي push على فرع main
    branches: [ main ]
  pull_request:        # تشغيل عند أي pull request على فرع main
    branches: [ main ]

jobs:
  build:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📂 Create app keystore dir
        run: mkdir -p app

      - name: 🔑 Generate debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore app/debug.keystore \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=AlAmin Pharmacy,O=AlAmin,C=YE"

      - name: 📝 Create keystore.properties
        run: |
          cat > keystore.properties << 'EOF'
          storeFile=app/debug.keystore
          storePassword=android
          keyAlias=androiddebugkey
          keyPassword=android
          EOF

      - name: 🔨 Setup Gradle wrapper
        run: chmod +x gradlew

      - name: 🏗️ Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: 🏗️ Build Debug APK (fallback)
        run: ./gradlew assembleDebug --no-daemon
        continue-on-error: true

      - name: 📤
